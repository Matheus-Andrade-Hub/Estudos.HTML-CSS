<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>simplificando o grid</title>
    <link rel="stylesheet" href="estilo/style.css">
</head>
<body>
    <main>
        <section> 
            <h1>Primeiro Grid</h1>
            <div class="container">
                <div class="items">A</div>
                <div class="items">B</div>
                <div class="items">C</div>
                <div class="items">D</div>
                <div class="items">E</div>
                <div class="items">F</div>
                <div class="items">G</div>
                <div class="items">H</div>
                <div class="items">I</div>
            </div>
        </section>
        <section> 
            <h1>Segundo Grid</h1>
            <div class="container-segundo">
                <div class="items-2">A</div>
                <div class="items-2">B</div>
                <div class="items-2">C</div>
            </div>
        </section>
        <section> 
            <h1>Terceiro Grid</h1>
            <div class="container-terceiro">
                <div class="items-3">A</div>
                <div class="items-3">B</div>
                <div class="items-3">C</div>
            </div>
        </section>
    </main>
</body>
</html>
