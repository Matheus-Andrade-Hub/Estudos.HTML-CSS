<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>formularios</title>
    <style>
        div {
            padding: 10px;
        }

        input {
            margin-left: 5px;
        }
    </style>
</head>
<body>
    <h1>Praticando formularios</h1>
    <form action="cadastro.js" method="post">
        <div>
            <label for="usuario">Usuario:</label>
            <input type="text" name="" id="usuario" minlength="5" maxlength="15"  autocomplete="username" required>
        </div>
        <div>
            <label for="e-mail">E-mail</label>
            <input type="email" name="" id="e-mail" autocomplete="email" required>
        </div>
        <div>
            <label for="senha">Senha: </label>
            <input type="password" name="" id="senha" min="6" max="18" autocomplete="current-password" required>
        </div>
        <div>
            <label for="datanasci">Data de Nascimento: </label>
            <input type="date" name="" id="datanasci"  required>
        </div>
        <div>
            <label for="horanasci">Hora do Nascimento: </label>
            <input type="time" name="" id="horanasci" autocomplete=""  required>
        </div>
        <div>
            <fieldset> 
                <legend>
                    <p>Sexo</p>
                </legend>
                <input type="radio" name="sexo" id="masc" checked> <label for="masc">Masculino</label> <br>
                <input type="radio" name="sexo" id="fem"> <label for="fem">Feminino</label>
            </fieldset>
        </div>
        <fieldset>
            <legend>
                <p>Jogos Favoritos</p>
            </legend>
            <div>
                <input type="checkbox" name="" id="minecraft"> <label for="minecraft">Minecraft</label> <br>
                <input type="checkbox" name="" id="genshi" checked> <label for="genshi">Genshin Impact</label> <br>
                <input type="checkbox" name="" id="wuwa"> <label for="wuwa">Wuthering Waves</label>
            </div>
        </fieldset>
        <div>
            <label for="satis">Nivel de satisfaçao:</label>
            <input type="range" name="" id="satis" min="1" max="10"> 
        </div> 
        <div>
            <select name="" id="">
                    <optgroup>
                        <option value="" selected>----Selecione uma opçao----</option>
                    </optgroup>

                    <optgroup label="Comidas-Favoritas">
                        <option value="strog">Strogonoff</option>
                        <option value="Macarrao">Macarão</option>
                        <option value="lasanha">lasanha</option>
                        <option value="mocoto">Mocotó</option>
                    </optgroup>

                    <optgroup label="Passa-tempo">
                        <option value="Jogos">Jogar Video game</option>
                        <option value="leitura">Leitura</option>
                        <option value="serie">Assistir Serie</option>
                        <option value="musica">Ouvir Musica</option>
                    </optgroup>

                    <optgroup label="Esportes">
                        <option value="volei">Volei</option>
                        <option value="foot">Futebol</option>
                        <option value="basq">Basquete</option>
                        <option value="base">Basebol</option>
                    </optgroup>
            </select>
        </div>
        <div>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </div>
    </form>
</body>
</html>
